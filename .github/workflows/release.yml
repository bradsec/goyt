name: Release

on:
  push:
    tags:
      # CalVer tags: YYYY.MM.DD (also matches optional .N same-day suffix)
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
          - { goos: windows, goarch: arm64, ext: .exe }
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Compiles Tailwind CSS and copies fonts into the embedded assets so the
      # binary ships the current UI even if the committed CSS is stale.
      - name: Build frontend assets
        run: |
          npm install
          npm run build-css

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          REF_NAME: ${{ github.ref_name }}
        run: go build -ldflags="-s -w -X goyt/internal/api.Version=${REF_NAME}" -o "goyt-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/goyt

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: goyt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: goyt-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  # A single release job publishes all binaries and generates the notes once.
  # Previously the publish step ran in every matrix job, so each one appended
  # auto-generated notes and the changelog line was duplicated.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          fail_on_unmatched_files: true
